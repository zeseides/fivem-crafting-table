<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>碎夢邊境 | 遊戲資訊查詢</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Rajdhani:wght@600;700&display=swap');
  :root {
    --bg: #0a0d14; --surface: #111827; --card: #151d2e; --card-hover: #1a2540;
    --border: #1e3a5f; --accent: #2563eb; --accent-light: #60a5fa;
    --text: #e2e8f0; --text-dim: #94a3b8; --green: #10b981; --yellow: #f59e0b;
    --purple: #a78bfa; --orange: #f97316;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }

  .wrapper { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 32px 20px 60px; }

  header { margin-bottom: 28px; }
  .server-label { font-size: 0.75rem; color: var(--accent-light); letter-spacing: 0.15em; text-transform: uppercase; font-family: 'Rajdhani', sans-serif; margin-bottom: 6px; }
  .header-title { font-family: 'Rajdhani', 'Noto Sans TC', sans-serif; font-size: 2.6rem; font-weight: 700; letter-spacing: 0.04em; background: linear-gradient(135deg, #fff 30%, var(--accent-light)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin-bottom: 6px; }
  .header-sub { color: var(--text-dim); font-size: 0.85rem; }

  .nav { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .nav-tab { padding: 10px 20px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-dim); font-size: 0.9rem; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; transition: all .2s; margin-bottom: -1px; white-space: nowrap; }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--accent-light); border-bottom-color: var(--accent-light); font-weight: 700; }

  .controls { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); width: 16px; height: 16px; }
  input[type="search"] { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 10px 14px 10px 38px; border-radius: 8px; font-family: 'Noto Sans TC', sans-serif; font-size: 0.9rem; outline: none; transition: border-color .2s; }
  input[type="search"]:focus { border-color: var(--accent); }
  input[type="search"]::placeholder { color: var(--text-dim); }
  .filter-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-label { font-size: 0.72rem; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; letter-spacing: 0.08em; white-space: nowrap; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .tab { padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text-dim); font-size: 0.8rem; cursor: pointer; transition: all .2s; white-space: nowrap; font-family: 'Noto Sans TC', sans-serif; }
  .tab:hover { border-color: var(--accent); color: var(--text); }
  .tab.active-station { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab.active-station.job { background: #7c3aed; border-color: #7c3aed; }
  .tab.active-cat { background: #1e3a5f; border-color: var(--accent-light); color: var(--accent-light); }

  .stats { color: var(--text-dim); font-size: 0.8rem; margin-bottom: 16px; }
  .stats span { color: var(--accent-light); font-weight: 700; }

  .section { margin-bottom: 36px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .section-icon { font-size: 1.1rem; }
  .section-title { font-family: 'Rajdhani', 'Noto Sans TC', sans-serif; font-size: 1.1rem; font-weight: 700; letter-spacing: 0.05em; }
  .section-title.general { color: var(--accent-light); }
  .section-title.job { color: var(--purple); }
  .section-count { font-size: 0.75rem; color: var(--text-dim); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 16px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 18px; transition: all .25s; position: relative; overflow: hidden; }
  .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0; transition: opacity .3s; }
  .card.job-card::before { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
  .card:hover { background: var(--card-hover); border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(37,99,235,0.18); }
  .card.job-card:hover { border-color: var(--purple); box-shadow: 0 8px 32px rgba(124,58,237,0.18); }
  .card:hover::before { opacity: 1; }

  @keyframes highlightPulse {
    0%   { border-color: var(--yellow); box-shadow: 0 0 0 0 rgba(245,158,11,0.6); }
    50%  { border-color: var(--yellow); box-shadow: 0 0 20px 6px rgba(245,158,11,0.3); }
    100% { border-color: var(--border); box-shadow: none; }
  }
  .card.highlight { animation: highlightPulse 1.8s ease-out forwards; }

  .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .item-icon { width: 48px; height: 48px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; flex-shrink: 0; align-self: flex-start; }
  .item-info { flex: 1; }
  .item-name { font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 4px; }
  .badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-family: 'Rajdhani', sans-serif; letter-spacing: 0.04em; }
  .badge-time { background: var(--accent); color: #fff; }
  .badge-time.job { background: #7c3aed; }
  .badge-lvl { background: #1e3a5f; color: var(--accent-light); border: 1px solid var(--border); }
  .badge-qty { background: #1a2e1a; color: var(--green); border: 1px solid #14532d; }
  .badge-cat { background: #1e2a3a; color: var(--text-dim); border: 1px solid var(--border); font-size: 0.65rem; }
  .item-desc { font-size: 0.78rem; color: var(--yellow); margin-top: 5px; line-height: 1.4; }
  .item-note { font-size: 0.78rem; color: var(--accent-light); margin-top: 10px; padding: 6px 10px; background: rgba(37,99,235,0.08); border-radius: 6px; border-left: 2px solid var(--accent); line-height: 1.6; }
  .divider { height: 1px; background: var(--border); margin: 12px 0; }
  .materials-label { font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; font-family: 'Rajdhani', sans-serif; }
  .materials { display: flex; flex-direction: column; gap: 5px; }
  .mat-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; }
  .mat-qty { font-family: 'Rajdhani', sans-serif; font-weight: 700; color: var(--accent-light); font-size: 0.9rem; min-width: 32px; }
  .mat-icon { font-size: 1rem; }
  .mat-name { color: var(--text-dim); line-height: 1.6; }

  /* 材料名稱可點擊 */
  .mat-link {
    color: var(--text);
    cursor: pointer;
    border-bottom: 1px dashed var(--accent-light);
    transition: color .15s, border-color .15s;
  }
  .mat-link:hover { color: var(--accent-light); border-bottom-color: var(--accent-light); }

  /* 圖鑑小卡 Popup */
  #itemPopup {
    display: none;
    position: absolute;
    z-index: 999;
    width: 260px;
    background: #1a2540;
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px rgba(96,165,250,0.15);
    pointer-events: auto;
  }
  .popup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .popup-icon { font-size: 1.6rem; width: 40px; height: 40px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .popup-name { font-size: 0.95rem; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .popup-effect { font-size: 0.75rem; color: var(--yellow); margin-bottom: 8px; }
  .popup-divider { height: 1px; background: var(--border); margin: 8px 0; }
  .popup-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; font-family: 'Rajdhani', sans-serif; }
  .popup-source { font-size: 0.8rem; color: var(--text-dim); line-height: 1.6; }
  .popup-note { font-size: 0.75rem; color: var(--accent-light); margin-top: 8px; padding: 5px 8px; background: rgba(37,99,235,0.08); border-radius: 5px; border-left: 2px solid var(--accent); line-height: 1.5; }

  /* 物品超連結（圖鑑內部） */
  .item-link { color: var(--accent-light); text-decoration: underline dotted; text-underline-offset: 2px; cursor: pointer; transition: color .15s; }
  .item-link:hover { color: #fff; }

  /* 價格表 */
  .price-table { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .price-header-row { display: grid; grid-template-columns: 1fr 100px 140px; padding: 10px 18px; background: var(--surface); font-size: 0.75rem; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; letter-spacing: 0.08em; text-transform: uppercase; }
  .price-row { display: grid; grid-template-columns: 1fr 100px 140px; padding: 12px 18px; border-top: 1px solid var(--border); transition: background .2s; align-items: center; }
  .price-row:hover { background: var(--card-hover); }
  .price-item-name { font-weight: 700; font-size: 0.9rem; }
  .price-cat { font-size: 0.78rem; color: var(--text-dim); }
  .price-value { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1rem; color: var(--green); }
  .price-value.shop { color: var(--orange); }
  .badge-rare   { font-size: 0.68rem; padding: 2px 7px; border-radius: 4px; font-weight: 700; font-family: 'Rajdhani', sans-serif; background: #7c1f1f; color: #fca5a5; border: 1px solid #ef4444; }
  .badge-normal { font-size: 0.68rem; padding: 2px 7px; border-radius: 4px; font-weight: 700; font-family: 'Rajdhani', sans-serif; background: #1e2a3a; color: var(--text-dim); border: 1px solid var(--border); }

  .no-results { text-align: center; padding: 80px 20px; color: var(--text-dim); }
  .no-results .icon { font-size: 3rem; margin-bottom: 12px; }
  .no-results p { font-size: 0.9rem; }
  footer { margin-top: 48px; text-align: center; color: var(--text-dim); font-size: 0.75rem; border-top: 1px solid var(--border); padding-top: 20px; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="server-label">⚔ 碎夢邊境 FiveM Server</div>
    <div class="header-title">遊戲資訊查詢</div>
    <div class="header-sub">合成表 · NPC收購價 · 商店購買價 · 物品圖鑑 · 物品升級</div>
  </header>

  <nav class="nav" id="navTabs"></nav>
  <div class="controls" id="controls"></div>
  <div id="pageContent"></div>

  <footer>碎夢邊境 · 遊戲資訊資料庫</footer>
</div>

<!-- 圖鑑小卡 Popup（fixed 在 body 層級） -->
<div id="itemPopup"></div>

<script src="data/crafting.js"></script>
<script src="data/prices.js"></script>
<script src="data/shop.js"></script>
<script src="data/items.js"></script>
<script src="data/upgrades.js"></script>
<script src="app.js"></script>
</body>
</html>
